<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NarrativeGen Web Tester</title>
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' x='6' font-size='48'%3E%F0%9F%93%96%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="panel">
    <!-- Theme Toggle Button -->
    <div class="theme-toggle-container">
      <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="テーマ切り替え">
        <span class="theme-icon" data-theme="light">☀️</span>
        <span class="theme-icon" data-theme="dark">🌙</span>
      </button>
    </div>

    <h1>NarrativeGen Web Tester</h1>
    <p>GameSession の挙動をブラウザで簡易確認できます。ブラウザで静的にホストしてください。</p>

    <div id="errorPanel" class="error-panel" style="display: none;">
      <h3>⚠️ バリデーションエラー</h3>
      <ul id="errorList" class="error-list"></ul>
    </div>

    <div id="csvPreviewModal" class="modal">
      <div class="modal-content">
        <h3>CSVプレビュー: <span id="csvFileName"></span></h3>
        <div id="csvPreviewContent"></div>
        <div style="margin-top: 1rem;">
          <button id="confirmImportBtn">インポート実行</button>
          <button id="cancelPreviewBtn">キャンセル</button>
        </div>
      </div>
    </div>

    <div id="resumeModal" class="modal">
      <div class="modal-content">
        <h3>保存されたセッションが見つかりました</h3>
        <div id="resumeInfo" class="resume-info"></div>
        <div style="margin-top: 1rem;">
          <button id="resumeBtn" class="primary-btn">再開する</button>
          <button id="newSessionBtn" class="secondary-btn">新規セッション</button>
        </div>
      </div>
    </div>

    <!-- Main Content Tabs -->
    <div class="tabs">
      <button id="storyTab" class="tab-btn active">ストーリー</button>
      <button id="debugTab" class="tab-btn">デバッグ</button>
      <button id="graphTab" class="tab-btn">グラフ</button>
      <button id="nodeListTab" class="tab-btn">ノード一覧</button>
      <button id="aiTab" class="tab-btn">AI支援</button>
    </div>

    <div id="storyPanel" class="tab-content active">
      <div class="split-mode-toggle">
        <button id="toggleSplitViewBtn" title="JSONエディタとストーリーを同時表示">
          分割ビュー
        </button>
      </div>
      <div id="storyMainContainer" class="story-container">
        <div class="story-left-panel">
          <div class="panel">
            <label for="modelSelect">サンプルモデル</label>
            <select id="modelSelect">
              <option value="tutorial">tutorial.json</option>
              <option value="linear">linear.json</option>
              <option value="branching_flags">branching_flags.json</option>
              <option value="resource_management">resource_management.json</option>
              <option value="time_gated">time_gated.json</option>
              <option value="multiple_endings">multiple_endings.json</option>
              <option value="inventory_demo">inventory_demo.json</option>
            </select>
            <button id="startBtn">サンプルを実行</button>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
            <button id="uploadBtn">モデルJSONアップロード</button>
            <button id="previewTopBtn">小説プレビュー</button>
            <button id="downloadTopBtn">モデルJSONダウンロード</button>
            <label for="csvFileInput" class="csv-label">CSVインポート</label>
            <input type="file" id="csvFileInput" accept=".csv,.tsv" style="display: none;">
            <button id="exportCsvBtn">CSVエクスポート</button>
            <button id="editBtn">モデルを編集</button>
          </div>

          <div id="dropZone" class="drop-zone">
            <p>またはここに JSON ファイルをドラッグ＆ドロップしてください</p>
          </div>

          <div id="guiEditMode" style="display: none;">
            <h2>GUI モデル編集</h2>
            <div id="nodeList"></div>
            <button id="addNodeBtn">ノードを追加</button>
            <button id="previewBtn">小説プレビュー</button>
            <button id="downloadBtn">編集モデルJSONダウンロード</button>
            <button id="saveGuiBtn">GUI保存して適用</button>
            <button id="cancelGuiBtn">キャンセル</button>
          </div>

          <p id="statusText" class="status-text info">サンプル未実行</p>

          <div class="save-load-controls">
            <button id="saveBtn" class="save-btn" title="現在の進行状況を保存">💾 保存</button>
            <button id="loadBtn" class="load-btn" title="保存した進行状況を読み込み">📂 読み込み</button>
            <button id="clearSaveBtn" class="clear-save-btn" title="保存データを削除">🗑️ セーブ削除</button>
            <label class="auto-save-toggle">
              <input type="checkbox" id="autoSaveToggle">
              <span>自動保存</span>
            </label>
            <span id="autoSaveIndicator" class="auto-save-indicator" style="display: none;">
              ✓ 自動保存済み
            </span>
          </div>

          <div id="choices"></div>

          <div id="storyView" class="story-view"></div>
        </div>

        <div class="story-resizer" id="storyResizer"></div>

        <div class="story-right-panel" id="storyJsonPanel">
          <h3>JSON エディタ</h3>
          <textarea id="storyJsonEditor" placeholder="モデルのJSONが表示されます..."></textarea>
          <button id="applyStoryJsonBtn">JSON適用</button>
        </div>
      </div>
    </div>

    <div id="debugPanel" class="tab-content">
      <div class="debug-container">
        <div id="stateDisplay">
          <h3>現在の状態</h3>
          <div id="flagsDisplay"></div>
          <div id="resourcesDisplay"></div>
          <div id="inventoryDisplay"></div>
        </div>
        <div id="reachabilityMap">
          <h3>到達可能性マップ</h3>
          <div id="reachableNodes"></div>
        </div>
      </div>
    </div>

    <div id="graphPanel" class="tab-content">
      <div class="graph-container">
        <div id="graphControls">
          <button id="zoomInBtn">ズームイン</button>
          <button id="zoomOutBtn">ズームアウト</button>
          <button id="resetViewBtn">リセット</button>
        </div>
        <svg id="graphSvg" width="100%" height="600"></svg>
      </div>
    </div>

    <div id="nodeListPanel" class="tab-content">
      <div class="node-list-container">
        <div class="node-list-controls">
          <input type="text" id="nodeSearch" placeholder="ノードを検索...">
          <button id="refreshNodeList">更新</button>
        </div>
        <div id="nodeOverview" class="node-overview">
          <!-- Node overview will be populated here -->
        </div>
      </div>
    </div>

    <div id="aiPanel" class="tab-content">
      <div class="ai-container">
        <div id="aiSettings">
          <h3>AI設定</h3>
          <label>プロバイダー:
            <select id="aiProvider">
              <option value="mock">Mock (テスト用)</option>
              <option value="openai">OpenAI</option>
              <option value="ollama">Ollama</option>
            </select>
          </label>
          <div id="openaiSettings" style="display: none;">
            <label>OpenAI API Key: <input type="password" id="openaiApiKey"></label>
            <label>Model: <select id="openaiModel">
                <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                <option value="gpt-4">GPT-4</option>
                <option value="gpt-4-turbo">GPT-4 Turbo</option>
              </select></label>
          </div>
          <button id="saveAiSettings">設定を保存</button>
        </div>
        <div id="aiActions">
          <h3>AI支援機能</h3>
          <button id="generateNextNodeBtn">次のノードを生成</button>
          <button id="paraphraseCurrentBtn">現在のテキストを言い換え</button>
          <div id="aiOutput"></div>
        </div>
      </div>


      <pre id="stateView">{ "status": "初期化待ち" }</pre>
    </div>

    <script type="module" src="./main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NarrativeGen Web Tester</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--surface:#16213e;--panel:#0f3460;
  --text:#e4e4e4;--text-dim:#8899aa;--accent:#e94560;
  --accent2:#0f9b58;--border:#2a3a5e;
  --choice-bg:#1b2c4f;--choice-hover:#243a5f;
  --font-mono:'Consolas','Menlo',monospace;
}
html,body{height:100%;font-family:'Segoe UI','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:16px;font-weight:600;color:var(--accent)}
header .model-name{font-size:13px;color:var(--text-dim)}
header button{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 12px;cursor:pointer;font-size:12px}
header button:hover{background:var(--choice-hover)}

/* Main layout */
main{flex:1;display:flex;overflow:hidden}

/* Story panel */
.story-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.node-content{flex:1;padding:24px 32px;overflow-y:auto}
.node-id{font-size:11px;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:8px}
.node-text{font-size:16px;line-height:1.8;white-space:pre-wrap;max-width:640px}

/* Choices */
.choices{padding:16px 32px;border-top:1px solid var(--border);background:var(--surface)}
.choices h3{font-size:12px;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.choice-btn{display:block;width:100%;text-align:left;padding:10px 16px;margin-bottom:6px;background:var(--choice-bg);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:14px;transition:background 0.15s}
.choice-btn:hover{background:var(--choice-hover);border-color:var(--accent)}
.choice-btn .choice-id{font-size:10px;color:var(--text-dim);font-family:var(--font-mono)}
.choice-btn .choice-target{font-size:10px;color:var(--accent2);font-family:var(--font-mono);margin-left:8px}
.no-choices{font-size:13px;color:var(--text-dim);font-style:italic;padding:8px 0}

/* Side panel */
.side-panel{width:280px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.side-section{padding:12px 16px;border-bottom:1px solid var(--border)}
.side-section h3{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.state-table{width:100%;font-size:12px;font-family:var(--font-mono)}
.state-table td{padding:2px 0}
.state-table .key{color:var(--accent2)}
.state-table .val{text-align:right;color:var(--text)}
.state-empty{font-size:11px;color:var(--text-dim);font-style:italic}

/* History */
.history-list{flex:1;overflow-y:auto;padding:12px 16px}
.history-list h3{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.history-item{font-size:11px;font-family:var(--font-mono);padding:3px 0;color:var(--text-dim)}
.history-item .step{color:var(--accent);margin-right:6px}
.history-item.current{color:var(--text);font-weight:600}

/* Drop zone / loader */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:48px 64px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(233,69,96,0.05)}
.drop-zone p{font-size:14px;color:var(--text-dim);margin-bottom:8px}
.drop-zone .hint{font-size:11px;color:var(--text-dim)}
.or-text{font-size:12px;color:var(--text-dim)}
.example-btns{display:flex;gap:8px}
.example-btn{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 16px;cursor:pointer;font-size:12px}
.example-btn:hover{border-color:var(--accent)}

/* End screen */
.end-screen{text-align:center;padding:48px;color:var(--text-dim)}
.end-screen h2{color:var(--accent);margin-bottom:12px}
.end-screen button{margin-top:16px}

/* Responsive */
@media(max-width:768px){.side-panel{display:none}}
</style>
</head>
<body>

<header>
  <h1>NarrativeGen Tester</h1>
  <span class="model-name" id="model-name"></span>
  <div style="flex:1"></div>
  <button id="btn-restart" style="display:none">Restart</button>
  <button id="btn-load">Load Model</button>
</header>

<main>
  <!-- Loader (initial state) -->
  <div class="story-panel" id="loader-view">
    <div class="loader">
      <div class="drop-zone" id="drop-zone">
        <p>Drop model JSON here</p>
        <span class="hint">or click to select file</span>
      </div>
      <span class="or-text">or try an example</span>
      <div class="example-btns" id="example-btns"></div>
    </div>
  </div>

  <!-- Game view -->
  <div class="story-panel" id="game-view" style="display:none">
    <div class="node-content">
      <div class="node-id" id="node-id"></div>
      <div class="node-text" id="node-text"></div>
    </div>
    <div class="choices" id="choices-area">
      <h3>Choices</h3>
      <div id="choices-list"></div>
    </div>
  </div>

  <!-- Side panel -->
  <div class="side-panel" id="side-panel" style="display:none">
    <div class="side-section">
      <h3>Flags</h3>
      <div id="state-flags"><span class="state-empty">none</span></div>
    </div>
    <div class="side-section">
      <h3>Resources</h3>
      <div id="state-resources"><span class="state-empty">none</span></div>
    </div>
    <div class="side-section">
      <h3>Variables</h3>
      <div id="state-variables"><span class="state-empty">none</span></div>
    </div>
    <div class="history-list">
      <h3>History</h3>
      <div id="history"></div>
    </div>
  </div>
</main>

<input type="file" id="file-input" accept=".json" style="display:none">

<script type="module">
import {
  startSession,
  getAvailableChoices,
  applyChoice,
} from '../../packages/engine-ts/dist/browser.js';

// --- State ---
let model = null;
let session = null;
const history = [];

// --- DOM refs ---
const loaderView = document.getElementById('loader-view');
const gameView = document.getElementById('game-view');
const sidePanel = document.getElementById('side-panel');
const nodeIdEl = document.getElementById('node-id');
const nodeTextEl = document.getElementById('node-text');
const choicesList = document.getElementById('choices-list');
const modelNameEl = document.getElementById('model-name');
const btnRestart = document.getElementById('btn-restart');
const btnLoad = document.getElementById('btn-load');
const fileInput = document.getElementById('file-input');
const dropZone = document.getElementById('drop-zone');
const exampleBtns = document.getElementById('example-btns');
const stateFlags = document.getElementById('state-flags');
const stateResources = document.getElementById('state-resources');
const stateVariables = document.getElementById('state-variables');
const historyEl = document.getElementById('history');

// --- Example models ---
const EXAMPLES_DIR = '../../models/examples/';
const EXAMPLES = ['linear.json'];

for (const name of EXAMPLES) {
  const btn = document.createElement('button');
  btn.className = 'example-btn';
  btn.textContent = name.replace('.json', '');
  btn.addEventListener('click', async () => {
    try {
      const resp = await fetch(EXAMPLES_DIR + name);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      loadModel(data, name);
    } catch (e) {
      alert('Failed to load example: ' + e.message);
    }
  });
  exampleBtns.appendChild(btn);
}

// --- File loading ---
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) readFile(fileInput.files[0]);
});
btnLoad.addEventListener('click', () => fileInput.click());
btnRestart.addEventListener('click', () => { if (model) startGame(); });

function readFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      loadModel(data, file.name);
    } catch (e) {
      alert('Invalid JSON: ' + e.message);
    }
  };
  reader.readAsText(file);
}

// --- Game logic ---
function loadModel(data, name) {
  // Basic validation
  if (!data.startNode || !data.nodes) {
    alert('Invalid model: missing startNode or nodes');
    return;
  }
  model = data;
  modelNameEl.textContent = name || data.modelType || 'unnamed';
  startGame();
}

function startGame() {
  session = startSession(model);
  history.length = 0;
  history.push({ nodeId: session.nodeId, step: 0 });

  loaderView.style.display = 'none';
  gameView.style.display = 'flex';
  sidePanel.style.display = 'flex';
  btnRestart.style.display = '';

  renderNode();
}

function renderNode() {
  const node = model.nodes[session.nodeId];
  nodeIdEl.textContent = `Node: ${session.nodeId} | Time: ${session.time}`;

  if (!node) {
    // End or missing node
    nodeTextEl.innerHTML = '';
    choicesList.innerHTML = '';
    const endDiv = document.createElement('div');
    endDiv.className = 'end-screen';
    endDiv.innerHTML = `<h2>End</h2><p>Node "${session.nodeId}" not found in model.</p>`;
    nodeTextEl.appendChild(endDiv);
    updateState();
    updateHistory();
    return;
  }

  nodeTextEl.textContent = node.text || '(no text)';

  // Choices
  const choices = getAvailableChoices(session, model);
  choicesList.innerHTML = '';

  if (choices.length === 0) {
    const noChoice = document.createElement('div');
    noChoice.className = 'no-choices';
    noChoice.textContent = node.choices?.length
      ? 'No choices available (conditions not met)'
      : 'End of story';
    choicesList.appendChild(noChoice);
  } else {
    for (const choice of choices) {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `
        ${escapeHtml(choice.text)}
        <br><span class="choice-id">${choice.id}</span>
        <span class="choice-target">&rarr; ${choice.target}</span>
      `;
      btn.addEventListener('click', () => makeChoice(choice.id));
      choicesList.appendChild(btn);
    }
  }

  updateState();
  updateHistory();
}

function makeChoice(choiceId) {
  try {
    session = applyChoice(session, model, choiceId);
    history.push({ nodeId: session.nodeId, step: history.length, choiceId });
    renderNode();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// --- State display ---
function updateState() {
  stateFlags.innerHTML = renderStateTable(session.flags, v => v ? 'true' : 'false');
  stateResources.innerHTML = renderStateTable(session.resources, v => String(v));
  stateVariables.innerHTML = renderStateTable(session.variables, v => String(v));
}

function renderStateTable(obj, format) {
  const entries = Object.entries(obj || {});
  if (entries.length === 0) return '<span class="state-empty">none</span>';
  let html = '<table class="state-table">';
  for (const [k, v] of entries) {
    html += `<tr><td class="key">${escapeHtml(k)}</td><td class="val">${escapeHtml(format(v))}</td></tr>`;
  }
  html += '</table>';
  return html;
}

function updateHistory() {
  historyEl.innerHTML = '';
  for (let i = history.length - 1; i >= 0; i--) {
    const item = history[i];
    const div = document.createElement('div');
    div.className = 'history-item' + (i === history.length - 1 ? ' current' : '');
    div.innerHTML = `<span class="step">${item.step}</span>${escapeHtml(item.nodeId)}${item.choiceId ? ' <span style="color:var(--text-dim)">[' + escapeHtml(item.choiceId) + ']</span>' : ''}`;
    historyEl.appendChild(div);
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
